<li><strong>Optimasi Likuiditas</strong> — Menjamin ketersediaan modal kerja operasional setiap unit sekolah</li>
<li><strong>Standardisasi Prosedur</strong> — Mekanisme penanganan tunggakan yang seragam dan objektif</li>
<li><strong>Disiplin Finansial</strong> — Membangun kesadaran tanggung jawab administratif orang tua/wali</li>
<li><strong>Dokumentasi Legalitas</strong> — Bukti penagihan sebagai prasyarat pengajuan <em>write-off</em></li>
</ol>
<blockquote>
<p>Kebijakan ini berlaku untuk seluruh unit TK, SD, SMP, dan SMA di bawah YPII.<br />
Jenis piutang yang diatur: <strong>Uang Pangkal (UP)</strong> dan <strong>Uang Sekolah (US)</strong>.</p>
</blockquote>
<footer>© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-header="Yayasan Penyelenggaraan Ilahi Indonesia" data-footer="© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0" data-theme="keuangan" data-lang="id" lang="id" data-marpit-pagination="3" style="--paginate:true;--header:Yayasan Penyelenggaraan Ilahi Indonesia;--footer:© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0;--theme:keuangan;--lang:id;" data-marpit-pagination-total="10">
<header>Yayasan Penyelenggaraan Ilahi Indonesia</header>
<h2 id="jadwal-tagihan">Jadwal Tagihan</h2>
<table>
<thead>
<tr>
<th>Jenis</th>
<th>Tagihan</th>
<th>Jatuh Tempo</th>
<th>Masa Toleransi</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Uang Sekolah (US)</strong></td>
<td>Tgl 1 setiap bulan</td>
<td>Tgl 10 setiap bulan</td>
<td>H-3 s.d. H+7 (tgl 8–17)</td>
</tr>
<tr>
<td><strong>Uang Pangkal (UP)</strong></td>
<td>Sesuai SPMB / kesepakatan</td>
<td>Sebelum 1 Januari tahun berikutnya</td>
<td>H-3 s.d. H+7 dari jatuh tempo</td>
</tr>
</tbody>
</table>
<p><strong>Pengecualian:</strong> Guru/karyawan YPII yang menyekolahkan anaknya di unit YPII → pembayaran melalui <strong>pemotongan gaji</strong>, bukan jalur eskalasi formal.</p>
<footer>© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-header="Yayasan Penyelenggaraan Ilahi Indonesia" data-footer="© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0" data-class="divider" data-theme="keuangan" data-lang="id" lang="id" class="divider" data-marpit-pagination="4" style="--paginate:true;--header:Yayasan Penyelenggaraan Ilahi Indonesia;--footer:© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0;--class:divider;--theme:keuangan;--lang:id;" data-marpit-pagination-total="10">
<header>Yayasan Penyelenggaraan Ilahi Indonesia</header>

<h1 id="mekanisme-eskalasi">MEKANISME ESKALASI</h1>
<h2 id="pengingat-lunak-%E2%86%92-sp1-%E2%86%92-sp2-%E2%86%92-sp3">Pengingat Lunak → SP1 → SP2 → SP3</h2>
<footer>© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-header="Yayasan Penyelenggaraan Ilahi Indonesia" data-footer="© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0" data-theme="keuangan" data-lang="id" lang="id" data-marpit-pagination="5" style="--paginate:true;--header:Yayasan Penyelenggaraan Ilahi Indonesia;--footer:© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0;--theme:keuangan;--lang:id;" data-marpit-pagination-total="10">
<header>Yayasan Penyelenggaraan Ilahi Indonesia</header>
<h2 id="tahapan-eskalasi-penagihan">Tahapan Eskalasi Penagihan</h2>
<pre><code>Pengingat Lunak  →  SP1  →  SP2  →  SP3
     (WA)                  + Kunjungan Rumah
</code></pre>
<table>
<thead>
<tr>
<th>Tahap</th>
<th>Penerbit</th>
<th>Keterangan</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Pengingat Lunak</strong></td>
<td>Staf Admin Yayasan Cabang</td>
<td>WhatsApp informal, sebelum jatuh tempo</td>
</tr>
<tr>
<td><strong>SP1</strong></td>
<td>Koordinator TU Unit</td>
<td>Surat formal pertama, denda mulai berlaku</td>
</tr>
<tr>
<td><strong>SP2</strong></td>
<td>Kepala Sekolah</td>
<td>Kunjungan rumah wajib dilakukan pada tahap ini</td>
</tr>
<tr>
<td><strong>SP3</strong></td>
<td>Kepala Sekolah + co-sign PJ Yayasan Cabang</td>
<td>Eskalasi terakhir sebelum <em>write-off</em></td>
</tr>
</tbody>
</table>
<p>Masa berlaku dan konsekuensi setiap tahap → <a href="https://wiki.cantum-ypii.com/bin/view/Home/keuangan/01-pendapatan/04-decision-table/03-eskalasi-piutang-uang-sekolah/">DEC-FIN-PIU-001</a></p>
<footer>© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-header="Yayasan Penyelenggaraan Ilahi Indonesia" data-footer="© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0" data-theme="keuangan" data-lang="id" lang="id" data-marpit-pagination="6" style="--paginate:true;--header:Yayasan Penyelenggaraan Ilahi Indonesia;--footer:© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0;--theme:keuangan;--lang:id;" data-marpit-pagination-total="10">
<header>Yayasan Penyelenggaraan Ilahi Indonesia</header>
<h2 id="sanksi-keterlambatan">Sanksi Keterlambatan</h2>
<p>Satu-satunya sanksi yang diperbolehkan adalah <strong>Denda Keterlambatan</strong>, berlaku sejak SP1.</p>
<table>
<thead>
<tr>
<th>Tahap</th>
<th>Referensi Besaran Denda</th>
</tr>
</thead>
<tbody>
<tr>
<td>Pengingat Lunak</td>
<td><a href="https://wiki.cantum-ypii.com/bin/view/Home/keuangan/01-pendapatan/04-decision-table/17-denda-pengingat-lunak/">DEC-FIN-PIU-015</a></td>
</tr>
<tr>
<td>SP1</td>
<td><a href="https://wiki.cantum-ypii.com/bin/view/Home/keuangan/01-pendapatan/04-decision-table/18-denda-sp1/">DEC-FIN-PIU-016</a></td>
</tr>
<tr>
<td>SP2</td>
<td><a href="https://wiki.cantum-ypii.com/bin/view/Home/keuangan/01-pendapatan/04-decision-table/19-denda-sp2/">DEC-FIN-PIU-017</a></td>
</tr>
<tr>
<td>SP3</td>
<td><a href="https://wiki.cantum-ypii.com/bin/view/Home/keuangan/01-pendapatan/04-decision-table/20-denda-sp3/">DEC-FIN-PIU-018</a></td>
</tr>
</tbody>
</table>
<p><strong>Larangan eksplisit:</strong> penahanan rapor, pembatasan ujian/pelajaran, skorsing, larangan masuk sekolah, atau penghalangan kenaikan kelas.<br />
Tunggakan <strong>tidak boleh</strong> membatasi hak pendidikan maupun hak administrasi siswa.</p>
<footer>© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-header="Yayasan Penyelenggaraan Ilahi Indonesia" data-footer="© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0" data-theme="keuangan" data-lang="id" lang="id" data-marpit-pagination="7" style="--paginate:true;--header:Yayasan Penyelenggaraan Ilahi Indonesia;--footer:© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0;--theme:keuangan;--lang:id;" data-marpit-pagination-total="10">
<header>Yayasan Penyelenggaraan Ilahi Indonesia</header>
<h2 id="restrukturisasi-piutang">Restrukturisasi Piutang</h2>
<p>Ditawarkan kepada wali murid yang dikategorikan <strong>&quot;Mampu Sebagian&quot;</strong> setelah melalui seluruh tahapan eskalasi.</p>
<p><strong>Dua skema penyelesaian:</strong></p>
<table>
<thead>
<tr>
<th>Skema</th>
<th>Ketentuan</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Pelunasan Sekaligus (Lump Sum)</strong></td>
<td>Lunas maks. 3 hari kerja · Insentif → <a href="https://wiki.cantum-ypii.com/bin/view/Home/keuangan/01-pendapatan/04-decision-table/13-insentif-pelunasan-sekaligus/">DEC-FIN-PIU-011</a></td>
</tr>
<tr>
<td><strong>Angsuran Bertahap</strong></td>
<td>DP min. 20% saat tanda tangan · Tenor maks. 6 bln (&lt; Rp5 jt) atau 12 bln + jaminan (≥ Rp5 jt)</td>
</tr>
</tbody>
</table>
<p>Kelayakan → <a href="https://wiki.cantum-ypii.com/bin/view/Home/keuangan/01-pendapatan/04-decision-table/12-kelayakan-restrukturisasi-piutang/">DEC-FIN-PIU-010</a> · Prosedur lengkap → <a href="https://wiki.cantum-ypii.com/bin/view/Home/keuangan/01-pendapatan/02-standard-operating-procedure/11-restrukturisasi-dan-termin-penyelesaian-piutang/">SOP-FIN-PIU-003</a></p>
<footer>© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-header="Yayasan Penyelenggaraan Ilahi Indonesia" data-footer="© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0" data-theme="keuangan" data-lang="id" lang="id" data-marpit-pagination="8" style="--paginate:true;--header:Yayasan Penyelenggaraan Ilahi Indonesia;--footer:© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0;--theme:keuangan;--lang:id;" data-marpit-pagination-total="10">
<header>Yayasan Penyelenggaraan Ilahi Indonesia</header>
<h2 id="penghapusan-piutang-write-off">Penghapusan Piutang (<em>Write-Off</em>)</h2>
<p><strong>Syarat wajib kumulatif</strong> (keduanya harus terpenuhi):</p>
<ol>
<li>Status siswa: <strong>Tidak Aktif</strong> (Lulus / Mutasi / Drop Out / Tanpa Kabar)</li>
<li>Usia piutang <strong>≥ 3 tahun</strong> sejak jatuh tempo</li>
</ol>
<p><strong>+ minimal satu syarat tambahan:</strong> tidak dapat dihubungi · ketidakmampuan ekonomi permanen · sisa piutang &lt; Rp100.000 · kondisi kahar · dll.</p>
<table>
<thead>
<tr>
<th>Peran</th>
<th>Fungsi</th>
</tr>
</thead>
<tbody>
<tr>
<td>Kepala Sekolah</td>
<td>Verifikator &amp; pengusul (bukan pemutus)</td>
</tr>
<tr>
<td><strong>PJ Yayasan Cabang</strong></td>
<td>Otoritas tunggal persetujuan akhir</td>
</tr>
</tbody>
</table>
<p>Detail kriteria → <a href="https://wiki.cantum-ypii.com/bin/view/Home/keuangan/01-pendapatan/04-decision-table/05-kriteria-penghapusan-piutang/">DEC-FIN-PIU-003</a> · Prosedur → <a href="https://wiki.cantum-ypii.com/bin/view/Home/keuangan/01-pendapatan/02-standard-operating-procedure/12-penghapusan-piutang/">SOP-FIN-PIU-004</a></p>
<footer>© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-header="Yayasan Penyelenggaraan Ilahi Indonesia" data-footer="© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0" data-theme="keuangan" data-lang="id" lang="id" data-marpit-pagination="9" style="--paginate:true;--header:Yayasan Penyelenggaraan Ilahi Indonesia;--footer:© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0;--theme:keuangan;--lang:id;" data-marpit-pagination-total="10">
<header>Yayasan Penyelenggaraan Ilahi Indonesia</header>
<h2 id="tanggung-jawab">Tanggung Jawab</h2>
<table>
<thead>
<tr>
<th>Pihak</th>
<th>Tanggung Jawab Utama</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Staf Admin Yayasan Cabang</strong></td>
<td>Data piutang akurat, pemantauan bulanan, pengingat lunak UP</td>
</tr>
<tr>
<td><strong>Koordinator TU Unit</strong></td>
<td>Menerbitkan SP1, distribusi surat tagihan, Aging Report</td>
</tr>
<tr>
<td><strong>Kepala Sekolah</strong></td>
<td>Tanda tangan SP2 &amp; SP3, pimpin pertemuan orang tua, usul <em>write-off</em></td>
</tr>
<tr>
<td><strong>Tim Kunjungan</strong></td>
<td>Kunjungan rumah, Berita Acara Kunjungan</td>
</tr>
<tr>
<td><strong>PJ Yayasan Cabang</strong></td>
<td>Co-sign SP3, persetujuan akhir <em>write-off</em></td>
</tr>
</tbody>
</table>
<p><strong>Aging Report</strong> wajib diserahkan ke Yayasan paling lambat <strong>tanggal 10</strong> bulan berikutnya.</p>
<footer>© YPII — Dokumen Internal | POL-FIN-PIU-001 v1.0</footer>
</section>
