name: Build & Deploy MARP ke GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Build MARP → HTML
        run: |
          # Buat struktur dist/ yang merefleksikan struktur source
          find keuangan -name "*.md" | while read src; do
            # Tentukan path output di dist/
            out="dist/${src%.md}.html"
            mkdir -p "$(dirname "$out")"
            marp "$src" \
              --html \
              --theme-set themes/ \
              --output "$out"
          done

      - name: Salin aset non-MD ke dist/
        run: |
          # Salin semua file non-.md dari keuangan/ ke dist/keuangan/
          rsync -av --exclude="*.md" keuangan/ dist/keuangan/ || true
          # Salin folder image/ dan themes/ agar gambar dalam presentasi & CSS dapat diakses
          [ -d image ] && rsync -av image/ dist/image/ || true
          [ -d themes ] && rsync -av themes/ dist/themes/ || true

      - name: Inline Iconify SVG ke setiap HTML presentasi
        run: |
          python3 - <<'EOF'
          import glob, os, re
          import urllib.request

          icon_cache = {}

          def fetch_svg(collection, name):
              key = f"{collection}:{name}"
              if key in icon_cache:
                  return icon_cache[key]
              url = f"https://api.iconify.design/{collection}/{name}.svg"
              try:
                  with urllib.request.urlopen(url, timeout=15) as resp:
                      svg = resp.read().decode("utf-8").strip()
                  icon_cache[key] = svg
                  print(f"  Fetched {key}")
                  return svg
              except Exception as e:
                  print(f"  WARN: gagal fetch {key}: {e}")
                  icon_cache[key] = None
                  return None

          def replace_icon(m):
              attrs = m.group(1)
              icon_m  = re.search(r'icon=["\']([^"\']+)["\']', attrs)
              width_m = re.search(r'width=["\']?(\w+)["\']?', attrs)
              style_m = re.search(r'style=["\']([^"\']+)["\']', attrs)
              if not icon_m:
                  return m.group(0)
              icon_id = icon_m.group(1)
              if ":" not in icon_id:
                  return m.group(0)
              collection, name = icon_id.split(":", 1)
              width  = width_m.group(1) if width_m else "1em"
              style  = style_m.group(1) if style_m else ""

              svg = fetch_svg(collection, name)
              if not svg:
                  return ""

              # Hapus width/height lama dari tag <svg>, ganti dengan yang baru
              def patch_svg_tag(tm):
                  tag = tm.group(0)
                  tag = re.sub(r'\s+width="[^"]*"', "", tag)
                  tag = re.sub(r"\s+width='[^']*'", "", tag)
                  tag = re.sub(r'\s+height="[^"]*"', "", tag)
                  tag = re.sub(r"\s+height='[^']*'", "", tag)
                  inline_style = style if style else "display:inline-block"
                  if "display" not in inline_style:
                      inline_style = "display:inline-block;" + inline_style
                  tag = tag.replace("<svg", f'<svg width="{width}" height="{width}" style="{inline_style}" aria-hidden="true"', 1)
                  return tag

              svg = re.sub(r"<svg\b[^>]*>", patch_svg_tag, svg, count=1)
              return svg

          pattern = re.compile(r"<iconify-icon\s+([^>]+)>\s*</iconify-icon>")

          for f in glob.glob("dist/**/*.html", recursive=True):
              if os.path.basename(f) == "index.html":
                  continue
              with open(f, "r", encoding="utf-8") as fh:
                  content = fh.read()
              if "<iconify-icon" not in content:
                  continue
              print(f"Processing: {f}")
              new_content = pattern.sub(replace_icon, content)
              if new_content != content:
                  with open(f, "w", encoding="utf-8") as fh:
                      fh.write(new_content)
                  print(f"  Done.")
          EOF

      - name: Generate index.html di setiap folder
        run: |
          # Untuk setiap folder di dalam dist/ yang memiliki file .html,
          # buat index.html yang berisi daftar link ke file tersebut.
          find dist -type d | while read dir; do
            # Kumpulkan semua HTML di folder ini (kecuali index.html itu sendiri)
            html_files=$(find "$dir" -maxdepth 1 -name "*.html" ! -name "index.html" | sort)
            subdirs=$(find "$dir" -maxdepth 1 -mindepth 1 -type d | sort)

            # Hanya buat index jika ada isi (file html atau subfolder)
            if [ -z "$html_files" ] && [ -z "$subdirs" ]; then
              continue
            fi

            # Judul berdasarkan nama folder
            folder_name=$(basename "$dir")
            rel_path="${dir#dist/}"

            {
              echo "<!DOCTYPE html>"
              echo "<html lang=\"id\">"
              echo "<head>"
              echo "  <meta charset=\"UTF-8\">"
              echo "  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">"
              echo "  <title>Presentasi — ${rel_path:-Beranda}</title>"
              echo "  <style>"
              echo "    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }"
              echo "    h1 { border-bottom: 2px solid #333; padding-bottom: .4rem; }"
              echo "    ul { list-style: none; padding: 0; }"
              echo "    li { margin: .5rem 0; }"
              echo "    a { text-decoration: none; color: #0066cc; }"
              echo "    a:hover { text-decoration: underline; }"
              echo "    .folder::before { content: '📁 '; }"
              echo "    .file::before { content: '🖥 '; }"
              echo "  </style>"
              echo "</head>"
              echo "<body>"
              echo "  <h1>📊 Presentasi Keuangan YPII</h1>"
              echo "  <p><em>/${rel_path}</em></p>"
              echo "  <ul>"

              # Subfolder
              for subdir in $subdirs; do
                subname=$(basename "$subdir")
                echo "    <li class=\"folder\"><a href=\"${subname}/\">$subname</a></li>"
              done

              # File HTML
              for file in $html_files; do
                fname=$(basename "$file")
                label="${fname%.html}"
                echo "    <li class=\"file\"><a href=\"${fname}\">$label</a></li>"
              done

              echo "  </ul>"
              echo "</body>"
              echo "</html>"
            } > "$dir/index.html"
          done

      - name: Deploy ke gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
